services:
  - type: web
    name: pulse
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NEWS_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUMMARISE_WITH_AI
        value: false
