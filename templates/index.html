{% extends "base.html" %}

{% block title %}Pulse — Daily AI News{% endblock %}

{% block content %}
<!-- ── Header ──────────────────────────────────────────────────── -->
<header class="header">
    <div class="header__inner">
        <div id="header-left" style="display: flex; align-items: center; gap: var(--space-sm);">
            <div id="today-date" class="header__date">Mar 3</div>
            <button id="btn-back" class="header__settings" aria-label="Back to Feed" onclick="toggleSavedView()"
                style="display: none;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
        </div>

        <h1 id="header-title" class="header__title">Daily AI News</h1>

        <div id="header-actions" class="header__actions" style="display: flex; gap: var(--space-sm);">
            <button id="btn-saved-tab" class="header__settings" aria-label="Bookmarks" onclick="toggleSavedView()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                </svg>
                <span id="saved-badge" class="saved-badge" data-count="0"></span>
            </button>
            <button class="header__settings" aria-label="Settings" onclick="toggleSettingsView()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                    </path>
                </svg>
            </button>
        </div>
    </div>
</header>

<!-- ── Article Swipe Feed ──────────────────────────────────────── -->
<main class="feed-container" id="feed-container">
    <div id="swipe-wrapper" class="swipe-wrapper">
        <!-- Cards injected by app.js -->
    </div>
    <button class="nav-btn nav-btn--prev" id="nav-prev" onclick="flipPrev()" aria-label="Previous">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </button>
    <button class="nav-btn nav-btn--next" id="nav-next" onclick="flipNext()" aria-label="Next">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
    </button>
</main>

<!-- ── Settings View ────────────────────────────────────────────── -->
<div id="settings-container" class="settings-container">
    <header class="settings-header">
        <button id="btn-settings-back" class="header__settings" aria-label="Back" onclick="toggleSettingsView()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </button>
        <h2 class="settings-title">Settings</h2>
    </header>

    <div class="settings-content">
        <!-- Appearance -->
        <div class="settings-section">
            <h3 class="settings-section__title">Appearance</h3>
            <div class="settings-tabs">
                <button class="settings-tab" data-theme-val="light" onclick="setThemePreference('light')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    Light
                </button>

                <button class="settings-tab" data-theme-val="dark" onclick="setThemePreference('dark')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    Dark
                </button>
            </div>
        </div>

        <!-- General -->
        <div class="settings-section">
            <h3 class="settings-section__title">General</h3>
            <div class="settings-group">
                <div class="settings-item">
                    <div class="settings-item__icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg>
                    </div>
                    <div class="settings-item__body">
                        <div class="settings-item__label">Daily Reminder</div>
                        <div class="settings-item__sub" id="reminder-status-text">Off</div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="toggle-reminder">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="settings-item" onclick="installApp()">
                    <div class="settings-item__icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                    </div>
                    <div class="settings-item__label">Install App</div>
                    <svg class="settings-item__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </div>
                <div class="settings-item" onclick="showWhatsNew()">
                    <div class="settings-item__icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14.5 2L16 5.5l3.5 1.5-3.5 1.5L14.5 12 13 8.5 9.5 7 13 5.5z"></path>
                            <path d="M5.5 12L7 15.5l3.5 1.5-3.5 1.5L5.5 22 4 18.5.5 17 4 15.5z"></path>
                        </svg>
                    </div>
                    <div class="settings-item__label">What's new</div>
                    <svg class="settings-item__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </div>
                <div class="settings-item" onclick="refreshApp()">
                    <div class="settings-item__icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                    </div>
                    <div class="settings-item__label">Refresh App</div>
                    <svg class="settings-item__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </div>
            </div>
        </div>

        <!-- About Section Hidden
        <div class="settings-section">
            <h3 class="settings-section__title">About</h3>
            <div class="settings-group">
                <div class="settings-item" style="cursor: default;">
                    <div class="settings-item__icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="16" x2="12" y2="12"></line>
                            <line x1="12" y1="8" x2="12.01" y2="8"></line>
                        </svg>
                    </div>
                    <div class="settings-item__label">Version 2.1</div>
                </div>
                <div class="settings-item" onclick="sendFeedback()">
                    <div class="settings-item__icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                    </div>
                    <div class="settings-item__label">Send Feedback</div>
                    <svg class="settings-item__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </div>
            </div>
        </div>
        -->

        <div class="settings-footer"
            style="padding: 24px; text-align: center; font-size: 13px; color: var(--color-text-secondary); margin-top: auto; opacity: 0.8;">
            Built by <a href="https://lemoayodeji.notion.site/Hi-I-m-Ayodeji-Lemo-9ca782801cff49f7b37e0bc9e91539ef"
                target="_blank" style="text-decoration: underline; color: inherit;">Ayodeji</a>
        </div>
    </div>
</div>

<!-- ── Footer Action ───────────────────────────────────────────── -->
<footer class="footer-action" id="footer-action">
    <button class="btn-remind">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path
                d="M12 22A2 2 0 0 0 14 20H10A2 2 0 0 0 12 22M18 16V11C18 7.93 16.36 5.36 13.5 4.68V4A1.5 1.5 0 0 0 12 2.5A1.5 1.5 0 0 0 10.5 4V4.68C7.63 5.36 6 7.92 6 11V16L4 18V19H20V18L18 16Z" />
        </svg>
        Remind me daily
    </button>
</footer>
{% endblock %}
