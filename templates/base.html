<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Techizo — AI, Technology & Robotics news reader PWA">
  <meta name="theme-color" content="#1A1A2E">

  <title>{% block title %}Techizo{% endblock %}</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">

  <!-- Google Fonts — Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@700&display=swap">

  <!-- Stylesheets (order matters — tokens first, dark overrides last) -->
  <link rel="stylesheet" href="/static/css/tokens.css?v=40">
  <link rel="stylesheet" href="/static/css/base.css?v=40">
  <link rel="stylesheet" href="/static/css/components.css?v=40">
  <link rel="stylesheet" href="/static/css/dark.css?v=40">

  {% block head %}{% endblock %}
</head>

<body>
  {% block content %}{% endblock %}

  <!-- Toast notification container -->
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  <!-- JS (theme first so it applies before paint, then app logic) -->
  <script src="/static/js/theme.js?v=40"></script>
  <script src="/static/js/app.js?v=40"></script>
  <script src="/static/js/sw-register.js?v=40"></script>

  {% block scripts %}{% endblock %}
</body>

</html>
